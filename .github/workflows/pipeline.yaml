name: Weather report
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  weather:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        city: [Prague, London, NewYork, Tokyo]

    steps:
      - name: Fetch weather
        run: |
          CITY="${{ matrix.city }}"
          WEATHER=$(curl -s "wttr.in/$CITY?format=3")

          echo "Current weather in $CITY: $WEATHER"

          {
            echo "## 🌤 Weather report"
            echo ""
            echo "**City:** $CITY"
            echo ""
            echo "**Weather:** $WEATHER"
            echo ""
            echo "---"
          } >> $GITHUB_STEP_SUMMARY