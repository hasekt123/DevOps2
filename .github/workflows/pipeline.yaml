name: Weather report
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # každou hodinu

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch weather
        run: |
          CITY="Prague"
          WEATHER=$(curl -s "wttr.in/$CITY?format=3")
          echo "Current weather in $CITY: $WEATHER"

          echo "## $CITY Weather" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$WEATHER" >> $GITHUB_STEP_SUMMARY